<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BatMap 2025</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        .stats-box {
            position: fixed; top: 15px; right: 15px;
            background: white; padding: 12px 18px; border-radius: 5px;
            z-index: 1100; border: 1px solid #ccc; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            width: fit-content;
            min-width: 180px;
        }
        .stats-title { font-weight: bold; font-size: 15px; color: #333; margin-bottom: 2px; }
        .sync-status { display: flex; align-items: center; font-size: 12px; color: #666; }
        .dot { width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; margin-right: 6px; }
        .total-count { font-weight: bold; font-size: 14px; color: #27ae60; margin-top: 4px; }

        select {
            margin-top: 8px; width: 100%; padding: 4px; font-size: 13px;
            border: 1px solid #ddd; border-radius: 4px; background: #f9f9f9;
        }

        .legenda {
            position: fixed; bottom: 30px; left: 15px;
            background: white; padding: 12px; border-radius: 5px;
            z-index: 1100; border: 1px solid #ccc; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 11px; line-height: 1.6;
        }
        .legenda-title { font-weight: bold; font-size: 12px; margin-bottom: 6px; }
        .legenda-item { display: flex; align-items: center; margin-bottom: 3px; }
        .legenda-color { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }

        .popup-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 13px; }
        .popup-table td { padding: 4px 0; border-bottom: 1px solid #f2f2f2; vertical-align: top; }
        .label { color: #888; width: 85px; }
        .val { color: #333; font-weight: 500; }
        .specie-title { color: blue; font-weight: bold; font-size: 16px; text-align: center; margin-top: 10px; display: block; }
        .data-subtitle { font-size: 12px; color: #888; text-align: center; margin: 15px 0; display: block; }
        .popup-header { border-bottom: 1px solid #f0f0f0; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="stats-box">
    <div class="stats-title">BatMap 2025</div>
    <div class="sync-status"><span class="dot"></span> Sincronizzato</div>
    <select id="year-select">
        <option value="all">Tutte le segnalazioni</option>
    </select>
    <select id="specie-select">
        <option value="all">Tutte le specie</option>
    </select>
    <div class="total-count" id="total-val">Visualizzate: 0</div>
</div>

<div class="legenda">
    <div class="legenda-title">Legenda</div>
    <div class="legenda-item"><span class="legenda-color" style="background:#2ecc71"></span> Liberato / Recuperato dalla madre</div>
    <div class="legenda-item"><span class="legenda-color" style="background:red"></span> Morto</div>
    <div class="legenda-item"><span class="legenda-color" style="background:yellow"></span> In degenza</div>
    <div class="legenda-item"><span class="legenda-color" style="background:blue"></span> Altro</div>
</div>

<div id="map"></div>

<script>
    const map = L.map('map').setView([45.45, 11.5], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: 'BatMap' }).addTo(map);

    let allMarkers = [];
    const occupiedPositions = {};
    const years = [2022, 2023, 2024, 2025];
    const yearSelect = document.getElementById("year-select");
    const specieSelect = document.getElementById("specie-select");
    const seenSpecies = new Set();

    [...years].sort((a,b) => b-a).forEach(y => {
        const opt = document.createElement("option");
        opt.value = y;
        opt.innerText = "Segnalazioni " + y;
        yearSelect.appendChild(opt);
    });

    yearSelect.addEventListener("change", updateVisibility);
    specieSelect.addEventListener("change", updateVisibility);

    function updateVisibility() {
        const selectedYear = yearSelect.value;
        const selectedSpecie = specieSelect.value;
        let visibleCount = 0;

        allMarkers.forEach(item => {
            const matchYear = (selectedYear === "all" || String(item.year) === selectedYear);
            const matchSpecie = (selectedSpecie === "all" || item.specie.toLowerCase() === selectedSpecie.toLowerCase());

            if (matchYear && matchSpecie) {
                item.marker.addTo(map);
                visibleCount++;
            } else {
                map.removeLayer(item.marker);
            }
        });
        document.getElementById("total-val").innerText = "Visualizzate: " + visibleCount;
    }

    function excelDateToJS(serial) {
        if (!serial) return "-";
        if (typeof serial !== 'number') return String(serial);
        const date = new Date(Math.round((serial - 25569) * 86400 * 1000));
        const userOffset = date.getTimezoneOffset() * 60000;
        const utcDate = new Date(date.getTime() + userOffset);
        const day = String(utcDate.getDate()).padStart(2, '0');
        const month = String(utcDate.getMonth() + 1).padStart(2, '0');
        return day + "/" + month + "/" + utcDate.getFullYear();
    }

    async function processYear(year) {
        try {
            const url = "https://raw.githubusercontent.com/marcelloconsolo/BatMap/main/app/src/main/assets/Pipistrelli " + year + ".xlsx?v=" + Date.now();
            const resp = await fetch(url);
            if (!resp.ok) return;
            const data = await resp.arrayBuffer();
            const wb = XLSX.read(new Uint8Array(data), { type: 'array' });
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });

            let hIdx = -1;
            for(let i=0; i<20; i++) if(rows[i] && rows[i].join("").toLowerCase().match(/specie|data/)) { hIdx = i; break; }
            if(hIdx === -1) return;

            const h = rows[hIdx].map(s => String(s || "").toLowerCase().trim());
            const m = {
                sp: h.findIndex(x => x.includes("specie")),
                dt: h.findIndex(x => x.includes("data")),
                ora: h.findIndex(x => x === "ora"),
                lc: h.findIndex(x => x.includes("localit") || x.includes("indirizzo") || x.includes("via")),
                cm: h.findIndex(x => x.includes("comune") || x.includes("citt")),
                pr: h.findIndex(x => x.includes("prov") || x === "pr"),
                st: h.findIndex(x => x === "stato" || (x.includes("stato") && !x.includes("condizioni"))),
                nt: h.findIndex(x => x.includes("note") || x.includes("condizioni")),
                la: h.findIndex(x => x.includes("lat")),
                lo: h.findIndex(x => x.includes("lon") || x.includes("lng"))
            };

            for (let i = hIdx + 1; i < rows.length; i++) {
                const r = rows[i];
                if (!r || r.length === 0) continue;
                const lat = parseFloat(String(r[m.la] || "").replace(',', '.'));
                const lon = parseFloat(String(r[m.lo] || "").replace(',', '.'));

                if (!isNaN(lat) && !isNaN(lon)) {
                    const st = String(r[m.st] || "").toLowerCase();
                    let col = "blue";
                    if (st.includes("liberato") || st.includes("madre")) col="green";
                    else if (st.includes("morto")) col="red";
                    else if (st.includes("degenza")) col="yellow";

                    const dataFormattata = excelDateToJS(r[m.dt]);
                    let oraFormattata = "";
                    if (m.ora !== -1 && r[m.ora]) {
                        if (typeof r[m.ora] === 'number') {
                            const dateOra = new Date(Math.round((r[m.ora] - 25569) * 86400 * 1000));
                            const utcOra = new Date(dateOra.getTime() + (dateOra.getTimezoneOffset() * 60000));
                            oraFormattata = " ora " + String(utcOra.getHours()).padStart(2, '0') + ":" + String(utcOra.getMinutes()).padStart(2, '0');
                        } else {
                            oraFormattata = " ora " + String(r[m.ora]).trim().substring(0, 5);
                        }
                    }

                    const specieRaw = (r[m.sp] || "Pipistrello").trim();
                    let specieNameFixed = specieRaw;
                    if (specieRaw.toLowerCase() === "nyctalus leislerii") {
                        specieNameFixed = "Nyctalus leisleri";
                    }
                    const specieName = specieNameFixed.charAt(0).toUpperCase() + specieNameFixed.slice(1).toLowerCase();

                    if (!seenSpecies.has(specieName.toLowerCase())) {
                        seenSpecies.add(specieName.toLowerCase());
                        const opt = document.createElement("option");
                        opt.value = specieName;
                        opt.innerText = specieName;
                        specieSelect.appendChild(opt);
                        const options = Array.from(specieSelect.options);
                        const first = options.shift();
                        options.sort((a,b) => a.text.localeCompare(b.text));
                        specieSelect.innerHTML = "";
                        specieSelect.appendChild(first);
                        options.forEach(o => specieSelect.appendChild(o));
                        specieSelect.value = "all";
                    }

                    // Logica di spostamento (spiral jitter)
                    let finalLat = lat;
                    let finalLon = lon;
                    // Uso 4 decimali per il raggruppamento (~10 metri) per catturare punti "quasi" identici
                    const groupKey = lat.toFixed(4) + "," + lon.toFixed(4);

                    if (occupiedPositions[groupKey]) {
                        const count = occupiedPositions[groupKey];
                        const angle = count * 0.8;
                        const radius = 0.0004 * count; // Aumentato raggio per visibilità
                        finalLat += Math.cos(angle) * radius;
                        finalLon += Math.sin(angle) * radius;
                        occupiedPositions[groupKey]++;
                    } else {
                        occupiedPositions[groupKey] = 1;
                    }

                    const icon = new L.Icon({
                        iconUrl: "https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-" + col + ".png",
                        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
                    });

                    const popContent = '<div style="min-width:230px">' +
                                '<div class="popup-header"><div class="specie-title">' + specieName + '</div>' +
                                '<div class="data-subtitle">Segnalazione del ' + dataFormattata + oraFormattata + '</div></div>' +
                                '<table class="popup-table">' +
                                '<tr><td class="label">Località:</td><td class="val">' + (r[m.lc] || "-") + '</td></tr>' +
                                '<tr><td class="label">Comune:</td><td class="val">' + (r[m.cm] || "-") + '</td></tr>' +
                                '<tr><td class="label">Provincia:</td><td class="val">' + (r[m.pr] || "-") + '</td></tr>' +
                                '<tr><td class="label">Stato:</td><td class="val">' + (r[m.st] || "-") + '</td></tr>' +
                                '<tr><td class="label">Condizioni:</td><td class="val">' + (r[m.nt] || "-") + '</td></tr>' +
                                '</table></div>';

                    const marker = L.marker([finalLat, finalLon], { icon }).bindPopup(popContent);
                    allMarkers.push({ year, marker, specie: specieName });
                    marker.addTo(map);
                }
            }
            updateVisibility();
        } catch (e) { console.error(e); }
    }

    async function init() {
        for (const y of years) await processYear(y);
    }
    init();
</script>
</body>
</html>
