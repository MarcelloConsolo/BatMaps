<!DOCTYPE html>
<html lang="it">
<head>
    <title>BatMaps 2025 - Stable</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <style>
        body { margin:0; font-family:sans-serif; }
        #map { height:100vh; }
        #overlay {
            position:fixed; top:15px; right:15px;
            background:white; padding:15px;
            border-radius:10px;
            box-shadow:0 4px 15px rgba(0,0,0,0.2);
            z-index:1000;
        }
    </style>
</head>

<body>

<div id="overlay">
    <b>BatMaps 2025</b><br>
    <div id="status">Caricamento...</div>
    <div id="counter"></div>
</div>

<div id="map"></div>

<script>
const map = L.map('map').setView([45.4, 11.8], 8);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

/* NORMALIZE */
const norm = s => String(s||"")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9 ]/g," ")
    .replace(/\s+/g," ")
    .trim();

/* LEVENSHTEIN */
function lev(a,b){
    const m=[];
    for(let i=0;i<=b.length;i++){m[i]=[i]}
    for(let j=0;j<=a.length;j++){m[0][j]=j}
    for(let i=1;i<=b.length;i++){
        for(let j=1;j<=a.length;j++){
            m[i][j]=b[i-1]==a[j-1]?m[i-1][j-1]:
                Math.min(m[i-1][j-1]+1,m[i][j-1]+1,m[i-1][j]+1)
        }
    }
    return m[b.length][a.length]
}

function fuzzy(key,index){
    if(index[key]) return index[key]
    let best=null,score=3
    for(let k in index){
        let d=lev(key,k)
        if(d<score){score=d;best=index[k]}
    }
    return best
}

async function init(){
    const db=await (await fetch('web/comuni_italiani.json')).json()

    const idx={}
    for(let k in db){ idx[norm(k)]=db[k] }

    const file=await (await fetch('web/Pipistrelli 2025.xlsx?v='+Date.now())).arrayBuffer()
    const wb=XLSX.read(new Uint8Array(file),{type:'array'})
    const sheet=wb.Sheets[wb.SheetNames[0]]
    const rows=XLSX.utils.sheet_to_json(sheet,{header:1})

    /* HEADER INTELLIGENTE (FIX CRITICO) */
    let hIdx=0
    for(let i=0;i<rows.length && i<20;i++){
        if(rows[i]?.some(c=>{
            let s=String(c||"").toLowerCase()
            return s.includes("specie") || s.includes("data")
        })){
            hIdx=i
            break
        }
    }

    const header=rows[hIdx].map(h=>String(h||"").toLowerCase())
    const data=rows.slice(hIdx+1)

    const col=t=>{
        for(let i=0;i<header.length;i++)
            for(let x of t)
                if(header[i]?.includes(x)) return i
        return -1
    }

    const c={
        specie:col(["specie"]),
        com:col(["comune"]),
        loc:col(["localita"]),
        prov:col(["provincia"]),
        stato:col(["stato"]),
        note:col(["condizioni"]),
        lat:col(["lat"]),
        lon:col(["lon"])
    }

    const cluster=L.markerClusterGroup()
    let count=0

    data.forEach(r=>{
        if(!r || r.length<2) return

        const comRaw=String(r[c.com]||"").trim()
        const locRaw=String(r[c.loc]||"").trim()

        const key=norm(comRaw)
        const match=idx[key] || fuzzy(key,idx)

        let lat=parseFloat(String(r[c.lat]||"").replace(",","."))
        let lon=parseFloat(String(r[c.lon]||"").replace(",","."));

        if(isNaN(lat)||isNaN(lon)){
            if(match){
                lat=match.lat
                lon=match.lon
            } else {
                lat=45.5
                lon=11.5
            }
        }

        /* FIX LOCALITÀ */
        let locDisplay = "-"
        if(locRaw && locRaw !== "") locDisplay = locRaw
        else if(comRaw) locDisplay = comRaw

        const marker=L.marker([lat,lon]).bindPopup(`
            <b>${r[c.specie]||"Pipistrello"}</b><br>
            Località: ${locDisplay}<br>
            Comune: ${comRaw||"-"}<br>
            Provincia: ${r[c.prov]||"-"}<br>
            Stato: ${r[c.stato]||"-"}<br>
            Condizioni: ${r[c.note]||"-"}
        `)

        cluster.addLayer(marker)
        count++
    })

    map.addLayer(cluster)
    if(count>0) map.fitBounds(cluster.getBounds())

    document.getElementById("counter").innerText="Totale: "+count
    document.getElementById("status").innerText="OK"
}

init()
</script>

</body>
</html>
