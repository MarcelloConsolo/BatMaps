<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BatMaps 2025</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        .stats-box {
            position: fixed; top: 15px; right: 15px;
            background: white; padding: 12px 18px; border-radius: 5px;
            z-index: 1100; border: 1px solid #ccc; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .stats-title { font-weight: bold; font-size: 15px; color: #333; margin-bottom: 2px; }
        .sync-status { display: flex; align-items: center; font-size: 12px; color: #666; }
        .dot { width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; margin-right: 6px; }
        .total-count { font-weight: bold; font-size: 14px; color: #27ae60; margin-top: 4px; }

        .legenda {
            position: fixed; bottom: 30px; left: 15px;
            background: white; padding: 12px; border-radius: 5px;
            z-index: 1100; border: 1px solid #ccc; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 11px; line-height: 1.6;
        }
        .legenda-title { font-weight: bold; font-size: 12px; margin-bottom: 6px; }
        .legenda-item { display: flex; align-items: center; margin-bottom: 3px; }
        .legenda-color { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }

        .popup-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 13px; }
        .popup-table td { padding: 4px 0; border-bottom: 1px solid #f2f2f2; vertical-align: top; }
        .label { color: #888; width: 85px; }
        .val { color: #333; font-weight: 500; }
        .specie-title { color: blue; font-weight: bold; font-size: 15px; }
    </style>
</head>
<body>

<div class="stats-box">
    <div class="stats-title">BatMaps 2025</div>
    <div class="sync-status"><span class="dot"></span> Sincronizzato</div>
    <div class="total-count" id="total-val">Totale: 0</div>
</div>

<div class="legenda">
    <div class="legenda-title">Legenda</div>
    <div class="legenda-item"><span class="legenda-color" style="background:#2ecc71"></span> Liberato / Recuperato dalla madre</div>
    <div class="legenda-item"><span class="legenda-color" style="background:red"></span> Morto</div>
    <div class="legenda-item"><span class="legenda-color" style="background:yellow"></span> In degenza</div>
    <div class="legenda-item"><span class="legenda-color" style="background:blue"></span> Altro</div>
</div>

<div id="map"></div>

<script>
    const map = L.map('map').setView([45.45, 11.5], 7);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: 'BatMaps' }).addTo(map);

    let totalPoints = 0;

    // Database sintetico Comuni -> Provincia per il Web
    const provDB = {
        "mirano": "VE", "mogliano veneto": "TV", "vicenza": "VI", "padova": "PD", "venezia": "VE",
        "treviso": "TV", "verona": "VR", "belluno": "BL", "rovigo": "RO", "milano": "MI",
        "mira": "VE", "spinea": "VE", "martellago": "VE", "scorzè": "VE", "salzano": "VE",
        "noale": "VE", "santa maria di sala": "VE", "pianiga": "VE", "dolo": "VE", "fiesso d'artico": "VE"
    };

    function excelDateToJS(serial) {
        if (typeof serial !== 'number') return serial;
        const date = new Date(Math.round((serial - 25569) * 86400 * 1000));
        return date.toLocaleDateString('it-IT');
    }

    function getProvincia(comune) {
        const c = String(comune || "").toLowerCase().trim();
        if (provDB[c]) return provDB[c];
        // Fallback: se non lo conosco, metto un placeholder o cerco di indovinare dal nome
        return "";
    }

    async function getCoordinates(loc, com, prov, latF, lonF) {
        if (latF && lonF) {
            const lt = parseFloat(String(latF).replace(',', '.'));
            const ln = parseFloat(String(lonF).replace(',', '.'));
            if (!isNaN(lt) && !isNaN(ln)) return { lat: lt, lon: ln, src: 'file' };
        }
        try {
            const q = `${loc ? loc + ", " : ""}${com}, ${prov || ""}, Italia`;
            const resp = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&countrycodes=it&email=marcello.consolo@gmail.com`);
            const data = await resp.json();
            if (data && data.length > 0) return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon), src: 'web' };
            return null;
        } catch (e) { return null; }
    }

    async function processYear(year) {
        try {
            const url = `https://raw.githubusercontent.com/marcelloconsolo/BatMaps/main/app/src/main/assets/Pipistrelli ${year}.xlsx?v=${Date.now()}`;
            const resp = await fetch(url);
            if (!resp.ok) return;
            const data = await resp.arrayBuffer();
            const wb = XLSX.read(new Uint8Array(data), { type: 'array' });
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });

            let hIdx = -1;
            for(let i=0; i<20; i++) if(rows[i] && rows[i].join("").toLowerCase().match(/specie|data/)) { hIdx = i; break; }
            if(hIdx === -1) return;

            const h = rows[hIdx].map(s => String(s || "").toLowerCase().trim());
            const m = {
                sp: h.findIndex(x => x.includes("specie")),
                dt: h.findIndex(x => x.includes("data")),
                lc: h.findIndex(x => x.includes("localit") || x.includes("indirizzo") || x.includes("via")),
                cm: h.findIndex(x => x.includes("comune") || x.includes("citt")),
                pr: h.findIndex(x => x.includes("prov") || x === "pr"),
                st: h.findIndex(x => x === "stato" || (x.includes("stato") && !x.includes("condizioni"))),
                nt: h.findIndex(x => x.includes("note") || x.includes("condizioni")),
                la: h.findIndex(x => x.includes("lat")),
                lo: h.findIndex(x => x.includes("lon") || x.includes("lng"))
            };

            for (let i = hIdx + 1; i < rows.length; i++) {
                const r = rows[i];
                if (!r || r.length === 0) continue;

                const com = String(r[m.cm] || "").trim();
                const loc = String(r[m.lc] || "").trim();
                if (!com && !loc) continue;

                // Calcolo Provincia dal Comune
                let prov = getProvincia(com);
                if (!prov) prov = String(r[m.pr] || "").trim(); // Fallback all'Excel se il DB non lo ha

                const res = await getCoordinates(loc, com, prov, r[m.la], r[m.lo]);
                if (res) {
                    totalPoints++;
                    document.getElementById("total-val").innerText = `Totale: ${totalPoints}`;
                    const st = String(r[m.st] || "").toLowerCase();
                    let col = "blue";
                    if (st.includes("liberato")) col="green";
                    else if (st.includes("morto")) col="red";
                    else if (st.includes("degenza")) col="yellow";

                    const icon = new L.Icon({
                        iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${col}.png`,
                        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
                    });

                    const dataFormattata = excelDateToJS(r[m.dt]);

                    const pop = `
                        <div style="min-width:230px">
                            <div class="specie-title">${r[m.sp] || "Pipistrello"}</div>
                            <div style="font-size:11px; color:#999; margin-bottom:5px">Segnalazione del ${dataFormattata || "-"}</div>
                            <table class="popup-table">
                                <tr><td class="label">Località:</td><td class="val">${loc || "-"}</td></tr>
                                <tr><td class="label">Provincia:</td><td class="val">${prov || "-"}</td></tr>
                                <tr><td class="label">Comune:</td><td class="val">${com}</td></tr>
                                <tr><td class="label">Stato:</td><td class="val">${r[m.st] || "-"}</td></tr>
                                <tr><td class="label">Condizioni:</td><td class="val">${r[m.nt] || "-"}</td></tr>
                            </table>
                        </div>
                    `;
                    L.marker([res.lat, res.lon], { icon }).addTo(map).bindPopup(pop);
                }
                if (res && res.src === 'web') await new Promise(ok => setTimeout(ok, 1200));
            }
        } catch (e) { console.error(e); }
    }

    async function init() {
        for (const y of [2022, 2023, 2024, 2025]) await processYear(y);
    }
    init();
</script>
</body>
</html>
