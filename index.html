<!DOCTYPE html>
<html lang="it">
<head>
    <title>BatMaps 2025 - Versione 17.2</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #f4f7f6; }
        #map { height: 100vh; width: 100%; }
        #overlay {
            position: fixed; top: 15px; right: 15px;
            background: white; padding: 15px; border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1000;
            border-left: 5px solid #2980b9;
        }
        .popup-table { font-size: 13px; border-collapse: collapse; width: 100%; margin-top: 5px; }
        .popup-table td { padding: 5px 0; border-bottom: 1px solid #eee; vertical-align: top; }
        .label { font-weight: bold; color: #7f8c8d; width: 85px; }
        .valore { color: #2c3e50; font-weight: 500; }
        .specie-title { color: #2980b9; font-size: 1.2em; font-weight: bold; display: block; }
        .date-time-subtitle { font-size: 0.85em; color: #95a5a6; font-style: italic; margin-top: 4px; margin-bottom: 8px; }
    </style>
</head>
<body>
<div id="overlay">
    <b style="font-size:1.2em; color: #2c3e50;">BatMaps 2025</b><br>
    <div id="status" style="color: #7f8c8d; font-size: 0.9em; margin: 5px 0;">Sincronizzazione Excel...</div>
    <div id="counter" style="font-size: 1.2em; font-weight: bold; color: #27ae60;"></div>
</div>
<div id="map"></div>
<script>
    const map = L.map('map').setView([45.5479, 11.5446], 9);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const comuniDB = {
        "vicenza": "VI", "padova": "PD", "verona": "VR", "venezia": "VE", "treviso": "TV", "rovigo": "RO", "belluno": "BL",
        "mestre": "VE", "eraclea": "VE", "jesolo": "VE", "bassano": "VI", "asiago": "VI", "arzignano": "VI"
    };

    function getProvincia(rigaTesto, comune, localita) {
        let t = String(rigaTesto).toLowerCase();
        let c = String(comune || "").toLowerCase();
        let l = String(localita || "").toLowerCase();
        if (t.includes("padova")) return "PD";
        if (t.includes("venezia") || t.includes("eraclea") || t.includes("mestre")) return "VE";
        if (t.includes("vicenza") || t.includes("bassano") || t.includes("asiago")) return "VI";
        for (let nome in comuniDB) { if (c.includes(nome) || l.includes(nome)) return comuniDB[nome]; }
        return "-";
    }

    async function init() {
        try {
            const response = await fetch('Pipistrelli 2025.xlsx?v=' + Date.now());
            const data = new Uint8Array(await response.arrayBuffer());
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});

            let hIdx = 0;
            for(let i=0; i<rows.length; i++) {
                if(rows[i] && rows[i].some(c => String(c).toLowerCase().includes("speci"))) { hIdx = i; break; }
            }
            const header = rows[hIdx].map(h => String(h || "").toLowerCase().trim());
            const dataRows = rows.slice(hIdx + 1);

            const getCol = (targets) => {
                for(let t of targets) { let idx = header.indexOf(t); if(idx !== -1) return idx; }
                return -1;
            };

            const c = { specie: getCol(["specie"]), data: getCol(["data"]), loc: getCol(["località", "localit"]), com: getCol(["comune"]), prov: getCol(["provincia"]), lat: getCol(["lat"]), lon: getCol(["lon"]) };

            const markers = L.markerClusterGroup();
            let count = 0;

            dataRows.forEach(row => {
                if (!row || row.length < 3) return;
                let rigaTesto = row.join(" ");
                let vCom = String(row[c.com] || "").trim();
                let vLoc = String(row[c.loc] || "").trim();
                let vProv = String(row[c.prov] || "").trim();

                if (!vProv || vProv === "-" || vProv === "nan") vProv = getProvincia(rigaTesto, vCom, vLoc);

                let lat = parseFloat(String(row[c.lat] || 0).replace(",", "."));
                let lon = parseFloat(String(row[c.lon] || 0).replace(",", "."));

                if (!lat || isNaN(lat) || lat === 0) {
                    if (vProv === "PD") { lat = 45.4064; lon = 11.8768; }
                    else if (vProv === "VE") { lat = 45.4408; lon = 12.3155; }
                    else if (vProv === "VR") { lat = 45.4384; lon = 10.9916; }
                    else if (vProv === "TV") { lat = 45.6669; lon = 12.2431; }
                    else { lat = 45.5479; lon = 11.5446; }
                    lat += (Math.random()-0.5)*0.05; lon += (Math.random()-0.5)*0.05;
                }

                const popup = `<div style="min-width:200px"><span class="specie-title">${row[c.specie] || "Pipistrello"}</span><table class="popup-table"><tr><td class="label">Comune:</td><td>${vCom}</td></tr><tr><td class="label">Provincia:</td><td>${vProv}</td></tr></table></div>`;
                markers.addLayer(L.marker([lat, lon]).bindPopup(popup));
                count++;
            });
            map.addLayer(markers);
            document.getElementById('status').innerText = "✅ Sincronizzato";
            document.getElementById('counter').innerText = "Totale: " + count;
        } catch (e) { console.error(e); }
    }
    init();
</script>
</body>
</html>
