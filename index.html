<!DOCTYPE html>
<html lang="it">
<head>
    <title>BatMaps 2025 - Versione 17.10</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #f4f7f6; }
        #map { height: 100vh; width: 100%; }
        #overlay {
            position: fixed; top: 15px; right: 15px;
            background: white; padding: 15px; border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1000;
            border-left: 5px solid #2980b9;
        }
        .popup-table { font-size: 13px; border-collapse: collapse; width: 100%; margin-top: 5px; }
        .popup-table td { padding: 5px 0; border-bottom: 1px solid #eee; vertical-align: top; }
        .label { font-weight: bold; color: #7f8c8d; width: 90px; }
        .valore { color: #2c3e50; font-weight: 500; }
        .specie-title { color: #2980b9; font-size: 1.2em; font-weight: bold; display: block; }
        .date-subtitle { font-size: 0.85em; color: #95a5a6; font-style: italic; margin-bottom: 8px; }
    </style>
</head>
<body>
<div id="overlay">
    <b style="font-size:1.2em; color: #2c3e50;">BatMaps 2025</b><br>
    <div id="status" style="color: #7f8c8d; font-size: 0.9em; margin: 5px 0;">Sincronizzazione Excel...</div>
    <div id="counter" style="font-size: 1.2em; font-weight: bold; color: #27ae60;"></div>
</div>
<div id="map"></div>
<script>
    const map = L.map('map').setView([42.0, 12.5], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const coordsDB = {
        "PD": [45.4064, 11.8768], "VE": [45.4408, 12.3155], "VR": [45.4384, 10.9916], "TV": [45.6669, 12.2431],
        "RO": [45.0711, 11.7907], "BL": [46.1425, 12.2167], "VI": [45.5479, 11.5446], "BG": [45.6983, 9.6773],
        "RG": [36.9265, 14.7302], "MI": [45.4642, 9.1900], "RM": [41.9028, 12.4964], "NA": [40.8518, 14.2681],
        "TO": [45.0703, 7.6869], "BO": [44.4949, 11.3426], "BS": [45.5416, 10.2118], "TN": [46.0679, 11.1211],
        "MO": [44.6471, 10.9252]
    };

    function getProvSigla(riga) {
        let t = riga.toLowerCase();
        if (t.includes("padova")) return "PD";
        if (t.includes("venezia") || t.includes("eraclea") || t.includes("mestre")) return "VE";
        if (t.includes("verona")) return "VR";
        if (t.includes("treviso") || t.includes("cappella maggiore")) return "TV";
        if (t.includes("vicenza") || t.includes("bassano") || t.includes("asiago") || t.includes("castelgomberto") || t.includes("san vito") || t.includes("arcugnano") || t.includes("marano vicentino") || t.includes("breganze") || t.includes("costabissara")) return "VI";
        if (t.includes("modena")) return "MO";
        if (t.includes("bergamo")) return "BG";
        if (t.includes("ragusa")) return "RG";
        if (t.includes("milano")) return "MI";
        if (t.includes("roma")) return "RM";
        if (t.includes("napoli")) return "NA";
        if (t.includes("torino")) return "TO";
        if (t.includes("bologna")) return "BO";
        if (t.includes("brescia")) return "BS";
        if (t.includes("trento")) return "TN";
        return "-";
    }

    function formatTime(val) {
        if (!val) return "";
        let num = parseFloat(String(val).replace(",", "."));
        if (!isNaN(num) && num > 0 && num < 1) {
            let totalSeconds = Math.round(num * 24 * 3600);
            let hours = Math.floor(totalSeconds / 3600);
            let minutes = Math.floor((totalSeconds % 3600) / 60);
            return (hours < 10 ? "0" : "") + hours + ":" + (minutes < 10 ? "0" : "") + minutes;
        }
        return String(val);
    }

    async function init() {
        try {
            const response = await fetch('Pipistrelli 2025.xlsx?v=' + Date.now());
            const data = new Uint8Array(await response.arrayBuffer());
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});

            let hIdx = 0;
            for(let i=0; i<rows.length && i<20; i++) {
                if(rows[i] && rows[i].some(c => {
                    let s = String(c || "").toLowerCase();
                    return s.includes("speci") || s.includes("data");
                })) { hIdx = i; break; }
            }
            const header = rows[hIdx].map(h => String(h || "").toLowerCase().trim());
            const dataRows = rows.slice(hIdx + 1);

            const getCol = (targets) => {
                for(let t of targets) {
                    let idx = header.findIndex(h => h.includes(t));
                    if(idx !== -1) return idx;
                }
                return -1;
            };

            const c = {
                specie: getCol(["specie"]),
                data: getCol(["data"]),
                ora: getCol(["ora"]),
                loc: getCol(["localit"]),
                com: getCol(["comune"]),
                prov: getCol(["provin"]),
                stato: getCol(["stato"]),
                note: getCol(["condizioni", "note"]),
                lat: getCol(["latitud"]),
                lon: getCol(["longitud"])
            };

            const markers = L.markerClusterGroup();
            let count = 0;

            dataRows.forEach(row => {
                if (!row || row.length < 2) return;

                let vSpecie = String(row[c.specie] || "Pipistrello").trim();
                let vDataRaw = row[c.data];
                if (!vSpecie && !vDataRaw) return;

                let vCom = String(row[c.com] || "").trim() || "-";
                let vLoc = String(row[c.loc] || "").trim() || "-";
                let vProvOrig = String(row[c.prov] || "").trim();
                let vOra = formatTime(row[c.ora]);

                let rigaTesto = row.join(" ");
                let siglaAuto = getProvSigla(rigaTesto);
                let vProv = (vProvOrig.length === 2) ? vProvOrig.toUpperCase() : siglaAuto;

                let vData = "-";
                if (vDataRaw) {
                    if (typeof vDataRaw === 'number') vData = new Date((vDataRaw - 25569) * 86400 * 1000).toLocaleDateString('it-IT');
                    else vData = String(vDataRaw).split("T")[0];
                }

                let lat = parseFloat(String(row[c.lat] || 0).replace(",", "."));
                let lon = parseFloat(String(row[c.lon] || 0).replace(",", "."));

                if (!lat || isNaN(lat) || lat === 0) {
                    const base = coordsDB[vProv] || coordsDB["VI"];
                    lat = base[0] + (Math.random()-0.5)*0.2;
                    lon = base[1] + (Math.random()-0.5)*0.2;
                }

                const getV = (idx) => (idx !== -1 && row[idx]) ? String(row[idx]).trim() : "-";
                let vStato = getV(c.stato).toLowerCase();
                let markerColor = "blue";
                if (vStato.includes("liberato") || vStato.includes("recuperato da madre")) markerColor = "green";
                else if (vStato.includes("morto")) markerColor = "red";
                else if (vStato.includes("degenza")) markerColor = "yellow";

                const customIcon = new L.Icon({
                    iconUrl: `https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-${markerColor}.png`,
                    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                    iconSize: [25, 41],
                    iconAnchor: [12, 41],
                    popupAnchor: [1, -34],
                    shadowSize: [41, 41]
                });

                const popup = `
                    <div style="min-width:240px">
                        <span class="specie-title">${vSpecie}</span>
                        <div class="date-subtitle">Segnalazione del ${vData} ${vOra ? 'alle ore '+vOra : ''}</div>
                        <table class="popup-table">
                            <tr><td class="label">Località:</td><td class="valore">${vLoc}</td></tr>
                            <tr><td class="label">Comune:</td><td class="valore">${vCom}</td></tr>
                            <tr><td class="label">Provincia:</td><td class="valore">${vProv}</td></tr>
                            <tr><td class="label">Stato:</td><td class="valore">${getV(c.stato)}</td></tr>
                            <tr><td class="label">Condizioni:</td><td class="valore">${getV(c.note)}</td></tr>
                        </table>
                    </div>`;

                markers.addLayer(L.marker([lat, lon], {icon: customIcon}).bindPopup(popup));
                count++;
            });
            map.addLayer(markers);
            document.getElementById('status').innerText = "✅ Sincronizzato";
            document.getElementById('counter').innerText = "Totale: " + count;
        } catch (e) { console.error(e); document.getElementById('status').innerText = "❌ Errore caricamento"; }
    }
    init();
</script>
</body>
</html>
