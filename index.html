<!DOCTYPE html>
<html lang="it">
<head>
    <title>BatMaps 2025 - Versione 17.7</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #f4f7f6; }
        #map { height: 100vh; width: 100%; }
        #overlay {
            position: fixed; top: 15px; right: 15px;
            background: white; padding: 15px; border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1000;
            border-left: 5px solid #2980b9;
        }
        .popup-table { font-size: 13px; border-collapse: collapse; width: 100%; margin-top: 5px; }
        .popup-table td { padding: 5px 0; border-bottom: 1px solid #eee; vertical-align: top; }
        .label { font-weight: bold; color: #7f8c8d; width: 90px; }
        .valore { color: #2c3e50; font-weight: 500; }
        .specie-title { color: #2980b9; font-size: 1.2em; font-weight: bold; display: block; }
        .date-subtitle { font-size: 0.85em; color: #95a5a6; font-style: italic; margin-bottom: 8px; }
    </style>
</head>
<body>
<div id="overlay">
    <b style="font-size:1.2em; color: #2c3e50;">BatMaps 2025</b><br>
    <div id="status" style="color: #7f8c8d; font-size: 0.9em; margin: 5px 0;">Sincronizzazione Excel...</div>
    <div id="counter" style="font-size: 1.2em; font-weight: bold; color: #27ae60;"></div>
</div>
<div id="map"></div>
<script>
    const map = L.map('map').setView([45.5479, 11.5446], 9);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    function getProvincia(riga) {
        let t = riga.toLowerCase();
        if (t.includes("padova")) return "PD";
        if (t.includes("venezia") || t.includes("eraclea") || t.includes("mestre") || t.includes("jesolo")) return "VE";
        if (t.includes("verona")) return "VR";
        if (t.includes("treviso")) return "TV";
        if (t.includes("rovigo") || t.includes("adria")) return "RO";
        if (t.includes("belluno")) return "BL";
        if (t.includes("vicenza") || t.includes("bassano") || t.includes("asiago")) return "VI";
        return "-";
    }

    function formatTime(val) {
        if (!val) return "";
        let num = parseFloat(String(val).replace(",", "."));
        if (!isNaN(num) && num > 0 && num < 1) {
            let totalSeconds = Math.round(num * 24 * 3600);
            let hours = Math.floor(totalSeconds / 3600);
            let minutes = Math.floor((totalSeconds % 3600) / 60);
            return (hours < 10 ? "0" : "") + hours + ":" + (minutes < 10 ? "0" : "") + minutes;
        }
        return String(val);
    }

    async function init() {
        try {
            const response = await fetch('Pipistrelli 2025.xlsx?v=' + Date.now());
            const data = new Uint8Array(await response.arrayBuffer());
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, {header: 1});

            let hIdx = 0;
            for(let i=0; i<rows.length; i++) {
                if(rows[i] && rows[i].some(c => String(c).toLowerCase().includes("speci"))) { hIdx = i; break; }
            }
            const header = rows[hIdx].map(h => String(h || "").toLowerCase().trim());
            const dataRows = rows.slice(hIdx + 1);

            const getCol = (targets) => {
                for(let t of targets) { let idx = header.indexOf(t); if(idx !== -1) return idx; }
                return -1;
            };

            const c = {
                specie: getCol(["specie animale", "specie"]),
                data: getCol(["data segnalazione", "data"]),
                ora: getCol(["ora"]),
                loc: getCol(["località", "localit"]),
                com: getCol(["comune"]),
                prov: getCol(["provincia"]),
                stato: getCol(["stato"]),
                note: getCol(["condizioni al recupero", "note"]),
                lat: getCol(["latitudine"]),
                lon: getCol(["longitudine"])
            };

            const markers = L.markerClusterGroup();
            let count = 0;

            dataRows.forEach(row => {
                if (!row || row.length < 3) return;
                let vSpecie = row[c.specie] || "Pipistrello";
                let vCom = String(row[c.com] || "").trim();
                let vLoc = String(row[c.loc] || "").trim();
                let vProv = String(row[c.prov] || "").trim();
                let vDataRaw = row[c.data];
                let vOra = formatTime(row[c.ora]);

                let rigaTesto = row.join(" ");
                if (!vProv || vProv === "-" || vProv === "nan" || vProv.length > 2) vProv = getProvincia(rigaTesto);

                let vData = "-";
                if (vDataRaw) {
                    if (typeof vDataRaw === 'number') vData = new Date((vDataRaw - 25569) * 86400 * 1000).toLocaleDateString('it-IT');
                    else vData = String(vDataRaw).split("T")[0];
                }

                let lat = parseFloat(String(row[c.lat] || 0).replace(",", "."));
                let lon = parseFloat(String(row[c.lon] || 0).replace(",", "."));

                if (!lat || isNaN(lat) || lat === 0) {
                    const coords = { "PD": [45.4064, 11.8768], "VE": [45.4408, 12.3155], "VR": [45.4384, 10.9916], "TV": [45.6669, 12.2431], "RO": [45.0711, 11.7907], "BL": [46.1425, 12.2167], "VI": [45.5479, 11.5446] };
                    const base = coords[vProv] || coords["VI"];
                    lat = base[0] + (Math.random()-0.5)*0.1;
                    lon = base[1] + (Math.random()-0.5)*0.1;
                }

                const getV = (idx) => (idx !== -1 && row[idx]) ? String(row[idx]).trim() : "-";

                const popup = `
                    <div style="min-width:220px">
                        <span class="specie-title">${vSpecie}</span>
                        <div class="date-subtitle">Segnalazione del ${vData} ${vOra ? 'ore '+vOra : ''}</div>
                        <table class="popup-table">
                            <tr><td class="label">Località:</td><td class="valore">${vLoc}</td></tr>
                            <tr><td class="label">Comune:</td><td class="valore">${vCom}</td></tr>
                            <tr><td class="label">Provincia:</td><td class="valore">${vProv}</td></tr>
                            <tr><td class="label">Stato:</td><td class="valore">${getV(c.stato)}</td></tr>
                            <tr><td class="label">Condizioni:</td><td class="valore">${getV(c.note)}</td></tr>
                        </table>
                    </div>`;

                markers.addLayer(L.marker([lat, lon]).bindPopup(popup));
                count++;
            });
            map.addLayer(markers);
            document.getElementById('status').innerText = "✅ Sincronizzato";
            document.getElementById('counter').innerText = "Totale: " + count;
        } catch (e) { console.error(e); }
    }
    init();
</script>
</body>
</html>
